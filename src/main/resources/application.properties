spring.application.name=FireView

spring.config.import=optional:classpath:application-secret.properties

# Disable docker compose auto-start (enable when running with Docker)
spring.docker.compose.enabled=false

# H2 In-Memory Database
spring.datasource.url=jdbc:h2:mem:fireviewdb;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false


jwt.expiration-ms=86400000

# Spring 의 setAllowedOriginPatterns() 사용 - http://localhost:* 와일드카드 가능.
# Flutter web dev server 가 매 실행 시 동적 포트(예: 60255)를 쓰기 때문에 패턴 매칭 필수.
app.cors.allowed-origins=http://localhost:*,http://127.0.0.1:*,https://www.beens.kr

# OAuth2 - Naver Provider
spring.security.oauth2.client.registration.naver.scope=name,email,profile_image
spring.security.oauth2.client.registration.naver.client-name=Naver
spring.security.oauth2.client.registration.naver.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.naver.redirect-uri={baseUrl}/login/oauth2/code/naver

spring.security.oauth2.client.provider.naver.authorization-uri=https://nid.naver.com/oauth2.0/authorize
spring.security.oauth2.client.provider.naver.token-uri=https://nid.naver.com/oauth2.0/token
spring.security.oauth2.client.provider.naver.user-info-uri=https://openapi.naver.com/v1/nid/me
spring.security.oauth2.client.provider.naver.user-name-attribute=response

# OAuth2 - Google Provider
spring.security.oauth2.client.registration.google.scope=email,profile
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/google

# OAuth2 - Frontend redirect URL
# 로컬 개발: http://localhost:3000/oauth2/callback
# 운영 서버: https://www.beens.kr/oauth2/callback
oauth2.redirect-uri=https://www.beens.kr/oauth2/callback

# Cache (simple in-memory)
spring.cache.type=simple

# Mail - 로컬/테스트: 비활성화(콘솔 출력), 운영: application-prod.properties에서 true로 활성화
app.mail.enabled=false
app.mail.from=noreply@beens.kr
# 비밀번호 재설정 링크 베이스 URL (토큰을 쿼리 파라미터로 붙여서 발송)
app.mail.password-reset-base-url=https://www.beens.kr/reset-password

# Redis (disabled health check - enable Redis when available)
spring.data.redis.host=localhost
spring.data.redis.port=6379
management.health.redis.enabled=false

# Actuator
management.endpoints.web.exposure.include=health,info
management.health.defaults.enabled=true

# Logging
logging.level.com.example.fireview=DEBUG
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN

# Reverse proxy (nginx + EC2/Docker) 환경에서 X-Forwarded-* 헤더를 인식해
# OAuth2 redirect_uri 등의 {baseUrl} 치환이 외부 HTTPS 도메인으로 정확히 이루어지도록 한다.
server.forward-headers-strategy=framework

# Naver Shopping Search API
# 네이버 개발자센터(https://developers.naver.com)에서 발급받은 검색 API 키.
# 미설정 시 로컬 DB 검색으로 자동 fallback.
naver.shopping.client-id=${NAVER_CLIENT_ID:}
naver.shopping.client-secret=${NAVER_CLIENT_SECRET:}

# AI Server
# 로컬 개발: http://localhost:8000
# ngrok 연동 테스트: https://xxxx-xx-xx.ngrok-free.app (AI 서버팀에서 발급받은 URL로 교체)
# Azure 배포 후: https://fireview-ai.azurewebsites.net (또는 실제 Azure URL)
# 연결 확인: GET /api/analysis/health
ai.server.base-url=${AI_SERVER_URL}

spring.application.name=FireView

# Disable docker compose auto-start (enable when running with Docker)
spring.docker.compose.enabled=false

# H2 In-Memory Database (development)
spring.datasource.url=jdbc:h2:mem:fireviewdb;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

# JWT
jwt.secret=fireview-secret-key-for-hs256-signing-must-be-at-least-32-characters-long
jwt.expiration-ms=86400000

# Cache (simple in-memory)
spring.cache.type=simple

# Redis (disabled health check - enable Redis when available)
spring.data.redis.host=localhost
spring.data.redis.port=6379
management.health.redis.enabled=false

# Actuator
management.endpoints.web.exposure.include=health,info
management.health.defaults.enabled=true

# Logging
logging.level.com.example.fireview=DEBUG
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
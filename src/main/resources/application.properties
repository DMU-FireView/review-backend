spring.application.name=FireView

# ─────────────────────────────────────────────────────────────
# 서버 포트: AWS Elastic Beanstalk의 nginx는 기본적으로 포트 5000으로 포워딩합니다.
# 로컬 개발 시에도 5000번 포트로 통일합니다.
# ─────────────────────────────────────────────────────────────
server.port=5000

# ─────────────────────────────────────────────────────────────
# 비밀값(JWT secret, OAuth2 client-id/secret 등)은 application-secret.properties 에서 주입.
# 해당 파일은 .gitignore 처리되며, 없으면 optional 로 무시된다.
# ─────────────────────────────────────────────────────────────
spring.config.import=optional:classpath:application-secret.properties

# Disable docker compose auto-start (enable when running with Docker)
spring.docker.compose.enabled=false

# H2 In-Memory Database (development only — 운영 환경에선 MySQL 등으로 전환)
spring.datasource.url=jdbc:h2:mem:fireviewdb;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
# 주의: web-allow-others 옵션은 외부에서 H2 콘솔 접근을 허용하므로 절대 켜지 않는다.
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

# JWT — secret 값은 application-secret.properties 에서 주입
jwt.expiration-ms=86400000

# CORS 허용 Origin (콤마 구분)
app.cors.allowed-origins=http://localhost:3000,http://localhost:5173,https://your-app.vercel.app

# OAuth2 - Naver Provider (공개 정보)
spring.security.oauth2.client.registration.naver.scope=name,email,profile_image
spring.security.oauth2.client.registration.naver.client-name=Naver
spring.security.oauth2.client.registration.naver.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.naver.redirect-uri={baseUrl}/login/oauth2/code/naver

spring.security.oauth2.client.provider.naver.authorization-uri=https://nid.naver.com/oauth2.0/authorize
spring.security.oauth2.client.provider.naver.token-uri=https://nid.naver.com/oauth2.0/token
spring.security.oauth2.client.provider.naver.user-info-uri=https://openapi.naver.com/v1/nid/me
spring.security.oauth2.client.provider.naver.user-name-attribute=response

# OAuth2 - Google Provider (공개 정보)
spring.security.oauth2.client.registration.google.scope=email,profile
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/google

# OAuth2 - Frontend redirect URL (로그인 성공 후 프론트로 이동할 주소)
# 개발: http://localhost:3000/oauth2/callback
# 운영: https://www.beens.kr/oauth2/callback
oauth2.redirect-uri=http://localhost:3000/oauth2/callback

# Cache (simple in-memory)
spring.cache.type=simple

# Redis (disabled health check - enable Redis when available)
spring.data.redis.host=localhost
spring.data.redis.port=6379
management.health.redis.enabled=false

# Actuator
management.endpoints.web.exposure.include=health,info
management.health.defaults.enabled=true

# Logging
logging.level.com.example.fireview=DEBUG
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN

# AI Server
# 로컬 개발: http://localhost:8000
# ngrok 연동 테스트: https://xxxx-xx-xx.ngrok-free.app (AI 서버팀에서 발급받은 URL로 교체)
# Azure 배포 후: https://fireview-ai.azurewebsites.net (또는 실제 Azure URL)
# 연결 확인: GET /api/analysis/health
ai.server.base-url=http://localhost:8000

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

spring.h2.console.enabled=false

spring.data.redis.host=${REDIS_HOST:172.31.44.47}
spring.data.redis.port=6379
management.health.redis.enabled=true

# JWT
jwt.secret=${JWT_SECRET}

# Google OAuth2
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}

# Naver OAuth2
spring.security.oauth2.client.registration.naver.client-id=${NAVER_CLIENT_ID}
spring.security.oauth2.client.registration.naver.client-secret=${NAVER_CLIENT_SECRET}

# Cache
spring.cache.type=simple

app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS}
oauth2.redirect-uri=${OAUTH2_REDIRECT_URI}

server.port=8080

# nginx 프록시 환경에서 X-Forwarded-* 헤더 인식
# OAuth2 redirect_uri가 내부 localhost 대신 외부 IP/도메인으로 생성되도록 설정
server.forward-headers-strategy=framework

# 세션 쿠키 Secure=true (SameSite=None은 반드시 Secure와 함께 사용해야 함)
server.servlet.session.cookie.secure=true
server.servlet.session.cookie.http-only=true

# AI Server
ai.server.base-url=${AI_SERVER_URL:http://20.249.211.171:8000}

management.endpoints.web.exposure.include=health,info
management.health.defaults.enabled=true

logging.level.com.example.fireview=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
